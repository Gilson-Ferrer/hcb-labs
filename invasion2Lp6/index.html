<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Core - Portal de Talentos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>

        body { font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f8; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #ffffff; border-radius: 8px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05); border-top: 4px solid #0f62fe; }
        .logo-area { text-align: center; margin-bottom: 30px; }
        .logo-area h1 { margin: 0; color: #161616; font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
        .logo-area p { margin: 5px 0 0; color: #6c757d; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #495057; margin-bottom: 8px; }
        input[type="text"], input[type="email"], input[type="file"] { width: 100%; padding: 12px 15px; border: 1px solid #ced4da; border-radius: 4px; font-size: 14px; color: #212529; box-sizing: border-box; transition: border-color 0.2s; }
        input:focus { border-color: #0f62fe; outline: none; box-shadow: 0 0 0 3px rgba(15, 98, 254, 0.1); }
        input[disabled] { background-color: #e9ecef; color: #adb5bd; cursor: not-allowed; }
        .btn-submit { width: 100%; padding: 14px; background-color: #0f62fe; color: white; border: none; border-radius: 4px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background-color 0.2s; margin-top: 10px; }
        .btn-submit:hover { background-color: #0353e9; }
        .alert { display: none; padding: 12px 15px; margin-top: 20px; border-radius: 4px; font-size: 13px; font-weight: 500; }
        .alert-error { background-color: #fff5f5; color: #da1e28; border-left: 4px solid #da1e28; }
        .alert-success { background-color: #defbe6; color: #198038; border-left: 4px solid #198038; text-align: left; }
        .link-download { display: inline-block; margin-top: 15px; padding: 10px 15px; background: #198038; color: #fff; text-decoration: none; border-radius: 4px; font-weight: 600; }
        .help-text { font-size: 11px; color: #888; margin-top: 8px; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-area">
            <h1>Nexus Datacenter</h1>
            <p>Onboarding de Infraestrutura</p>
        </div>
        
        <form id="cadastro-form" onsubmit="event.preventDefault(); processarOnboarding();">
            
            <div class="form-group">
                <label>Nome Completo (Identificação Civil):</label>
                <input type="text" id="user_name" disabled value="PENDENTE_VALIDACAO_RH">
            </div>

            <div class="form-group">
                <label>E-mail Pessoal de Recuperação:</label>
                <input type="email" id="user_email" placeholder="nome@provedor.com" required>
                <div class="help-text">Por normas de sigilo da Nexus, aceitamos apenas provedores com criptografia nativa na Suíça.</div>
            </div>

            <div class="form-group">
                <label>Foto do Documento (.jpg):</label>
                <input type="file" id="user_doc" accept=".jpg" required>
            </div>
            
            <input type="hidden" id="upload_mime_type" value="application/octet-stream">

            <button type="submit" class="btn-submit">FINALIZAR CADASTRO</button>
        </form>

        <div id="msg-erro" class="alert alert-error"></div>
        <div id="msg-sucesso" class="alert alert-success"></div>
    </div>

    <script>
        const HASH_SISTEMA = "U2FsdGVkX1+kKMss4UIytDtQJ0piqFTK7/7097FmFZn+vF+fTeTgPI27F/IDZGOg72aeN10ypdmsW/YtUVT3GOmIfjw2n1LajTh0R/6CIoDq8HVYib/mtAz7zdMtTetA";

        function processarOnboarding() {
            const elNome = document.getElementById('user_name');
            const elEmail = document.getElementById('user_email').value;
            const elMime = document.getElementById('upload_mime_type').value;
            
            const msgErro = document.getElementById('msg-erro');
            const msgSucesso = document.getElementById('msg-sucesso');
            
            msgErro.style.display = 'none';
            msgSucesso.style.display = 'none';

            if (elNome.disabled || elNome.value === "PENDENTE_VALIDACAO_RH") {
                mostrarErro("O preenchimento do Nome Completo é obrigatório. Contate o RH se o campo estiver bloqueado.");
                return;
            }

            if (!elEmail.includes('@proton.me')) {
                mostrarErro("Provedor de e-mail não homologado.");
                return;
            }

            if (elMime !== 'image/jpeg') {
                mostrarErro(`Erro de validação de anexo. O sistema detectou o formato [${elMime}]. Apenas imagens JPEG são permitidas.`);
                return;
            }

            try {
                const chaveDinamica = elEmail.split('@')[1] + "-" + elMime;
                
                const bytesDescriptografados = CryptoJS.AES.decrypt(HASH_SISTEMA, chaveDinamica);
                const linkFinal = bytesDescriptografados.toString(CryptoJS.enc.Utf8);

                if (!linkFinal) throw new Error("Chave Inválida");

                document.getElementById('cadastro-form').style.display = 'none';
                
                msgSucesso.innerHTML = `
                    <strong>Integração Concluída!</strong><br><br>
                    O seu contrato de acesso foi gerado. <br><br>
                    <em>Nota do Sistema:</em> Devido a uma falha no renderizador PDF do nosso portal, o documento não pode ser exibido aqui... Talvez ele precise ser convertido.<br><br>
                    <a href="${linkFinal}" class="link-download" target="_blank">Acessar Documento de Onboarding</a>
                `;
                msgSucesso.style.display = 'block';

            } catch (e) {
                mostrarErro("Falha crítica na emissão do contrato. Violação de integridade nos dados do formulário.");
            }
        }

        function mostrarErro(texto) {
            const box = document.getElementById('msg-erro');
            box.innerText = texto;
            box.style.display = 'block';
        }
    </script>
</body>
</html>
