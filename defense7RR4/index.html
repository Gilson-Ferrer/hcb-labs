<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimFlix - Assista a Séries e Filmes</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { margin: 0; background-color: #141414; color: #fff; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; overflow-x: hidden; }
        header { display: flex; padding: 20px 4%; align-items: center; justify-content: space-between; position: absolute; width: 100%; box-sizing: border-box; background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%); z-index: 10; }
        .logo { color: #E50914; font-size: 36px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; }
        .nav-links { display: flex; gap: 20px; font-size: 14px; font-weight: 500; }
        .nav-links span { cursor: pointer; transition: 0.3s; }
        .nav-links span:hover { color: #b3b3b3; }

        .hero { height: 85vh; background: url('https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?q=80&w=2070') center/cover no-repeat; display: flex; align-items: center; padding: 0 4%; position: relative; }
        .hero::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, #141414 0%, transparent 80%); }
        .hero-content { position: relative; z-index: 2; max-width: 600px; }
        .hero-title { font-size: 4rem; margin-bottom: 10px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .hero-desc { font-size: 1.2rem; line-height: 1.5; margin-bottom: 20px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); font-weight: 300; }
        .btn { padding: 12px 28px; font-size: 1.2rem; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; margin-right: 10px; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px;}
        .btn-play { background: #fff; color: #000; }
        .btn-play:hover { background: #e6e6e6; }
        .btn-info { background: rgba(109, 109, 110, 0.7); color: #fff; }
        .btn-info:hover { background: rgba(109, 109, 110, 0.9); }

        .row { padding: 10px 4% 30px; position: relative; z-index: 5; }
        .row-title { font-size: 1.4rem; margin-bottom: 15px; font-weight: bold; }
        .posters { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .posters::-webkit-scrollbar { display: none; }
        .poster { flex: 0 0 220px; height: 320px; border-radius: 4px; object-fit: cover; transition: transform 0.3s; cursor: pointer; border: 1px solid #333; }
        .poster:hover { transform: scale(1.05); border-color: #fff; z-index: 2; }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="recarregar()">SIMFLIX</div>
        <div class="nav-links">
            <span onclick="recarregar()">Início</span>
            <span onclick="alertoNav('Séries originais em breve.')">Séries</span>
            <span onclick="alertoNav('Catálogo de filmes em manutenção.')">Filmes</span>
            <span onclick="alertoNav('Faça login para ver sua lista.')">Minha Lista</span>
        </div>
    </header>

    <div class="hero">
        <div class="hero-content">
            <div class="hero-title">Viagem no Tempo</div>
            <div class="hero-desc">Um thriller cibernético onde as sombras do passado ameaçam destruir o futuro de uma corporação. Assista agora ao documentário exclusivo.</div>
            <button class="btn btn-play" onclick="tentarAssistir()">▶ Assistir</button>
            <button class="btn btn-info" onclick="mostrarInfo()">ⓘ Mais Informações</button>
        </div>
    </div>

    <div class="row">
        <div class="row-title">Em Alta</div>
        <div class="posters">
            <img class="poster" onclick="tentarAssistir()" src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=400">
            <img class="poster" onclick="tentarAssistir()" src="https://images.unsplash.com/photo-1605810230434-7631ac76ec81?q=80&w=400">
            <img class="poster" onclick="tentarAssistir()" src="https://images.unsplash.com/photo-1542204165-65bf26472b9b?q=80&w=400">
            <img class="poster" onclick="tentarAssistir()" src="https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=400">
            <img class="poster" onclick="tentarAssistir()" src="https://images.unsplash.com/photo-1440404653325-ab127d49abc1?q=80&w=400">
        </div>
    </div>

    <script>
        console.log("[SIMFLIX_CORE] Media Engine Loaded.");

        function tentarAssistir() {
            Swal.fire({
                title: 'Conectando ao servidor...',
                html: 'Negociando chaves de criptografia DRM...',
                timer: 2500,
                timerProgressBar: true,
                background: '#141414',
                color: '#fff',
                didOpen: () => {
                    Swal.showLoading()
                }
            }).then((result) => {
                Swal.fire({
                    icon: 'error',
                    title: 'Falha de DRM (ERR_403_BR)',
                    text: 'A licença de exibição (DRM) falhou para a sua região. Contate o administrador do sistema para bypass.',
                    background: '#141414',
                    color: '#fff',
                    confirmButtonColor: '#E50914',
                    confirmButtonText: 'Fechar'
                });
            });
        }

        function mostrarInfo() {
            Swal.fire({
                title: 'Viagem no Tempo',
                text: 'Classificação: 18+ | 2h 14m | Obscuro, Cibernético. Uma equipe acessa o wayback machine para voltar em um dia específico de julho de 2026 para encontrar uma chave secreta no código da página.',
                imageUrl: 'https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?q=80&w=600',
                imageWidth: 400,
                imageAlt: 'Capa Filme',
                background: '#141414',
                color: '#fff',
                confirmButtonColor: '#E50914',
                confirmButtonText: 'Entendi'
            });
        }

        function alertoNav(msg) {
            Swal.fire({
                text: msg,
                toast: true,
                position: 'top-end',
                showConfirmButton: false,
                timer: 3000,
                background: '#333',
                color: '#fff'
            });
        }

        function recarregar() {
            window.scrollTo(0,0);
        }

        /* * ==========================================
         * ALERTA DEV: TICKET #8492
         * ==========================================
         * Procedimento de bypass de DRM para testes de QA na nova UI.
         * NÃO ESQUECER DE REMOVER ESTE BLOCO ANTES DO DEPLOY EM PRODUÇÃO!
         * Se o DRM travar na região BR (ERR_403_BR), injetar o token administrativo
         * ADMIN_TOKEN: T1M3_M4CH1N3_D3F3NS3
         * ==========================================
         */
    </script>
</body>
</html>
