<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ХОЛОД ГАЗЫ | Kholod</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #ffffff;
            color: #0f172a;
        }

        .thin-border {
            border: 1px solid #e2e8f0;
        }

        .bg-industry {
            background-image: url('https://images.unsplash.com/photo-1581092160562-40aa08e78837?q=80&w=2070');
            background-size: cover;
            background-position: center;
        }

        .input-minimal {
            border: none;
            border-bottom: 1px solid #cbd5e1;
            border-radius: 0;
            padding: 12px 0;
            background: transparent;
            transition: all 0.3s ease;
        }

        .input-minimal:focus {
            outline: none;
            border-bottom: 1px solid #0284c7;
            box-shadow: 0 1px 0 0 #0284c7;
        }

        .btn-premium {
            background-color: #0f172a;
            color: #ffffff;
            border: 1px solid #0f172a;
            transition: all 0.4s ease;
        }

        .btn-premium:hover {
            background-color: #ffffff;
            color: #0f172a;
        }

        .loader-bar {
            width: 0%;
            height: 1px;
            background-color: #0284c7;
            transition: width 1s ease-in-out;
        }
    </style>
</head>
<body class="min-h-screen flex w-full">

    <div class="hidden lg:flex lg:w-1/2 bg-industry relative items-end p-12">
        <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
        <div class="relative z-10 text-white">
            <h2 class="text-4xl font-light tracking-widest mb-2">ХОЛОД ГАЗЫ</h2>
            <p class="text-sm font-light tracking-[0.2em] opacity-80 uppercase">Синтез будущего с 1989 года</p>
        </div>
    </div>

    <div class="w-full lg:w-1/2 flex flex-col justify-between px-8 py-10 sm:px-16 md:px-24">
        
        <header class="flex justify-between items-center pb-8 border-b border-slate-100">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 border border-slate-900 flex items-center justify-center transform rotate-45">
                    <div class="w-3 h-3 bg-slate-900 transform -rotate-45"></div>
                </div>
                <span class="text-lg font-semibold tracking-widest">KHOLOD GASES</span>
            </div>
            <nav class="hidden sm:flex gap-6 text-xs font-semibold tracking-widest text-slate-400">
                <span onclick="openIntranet()" class="hover:text-slate-900 transition-colors cursor-pointer">ИНТРАНЕТ</span>
                <span onclick="openSupport()" class="hover:text-slate-900 transition-colors cursor-pointer">ПОДДЕРЖКА</span>
            </nav>
        </header>

        <main class="flex-grow flex flex-col justify-center max-w-md w-full mx-auto my-12">
            <h1 class="text-2xl font-light text-slate-800 mb-2">Авторизация доступа</h1>
            <p class="text-sm text-slate-500 font-light mb-12 leading-relaxed">Пожалуйста, введите идентификатор вашей оперативной группы для доступа к закрытым журналам.</p>

            <div class="relative w-full mb-8">
                <label class="text-xs font-semibold tracking-widest text-slate-400 uppercase">Идентификатор Группы</label>
                <input type="text" id="searchInput" class="input-minimal w-full text-lg font-mono uppercase text-slate-800 placeholder:text-slate-300" placeholder="НАПР.: **-******-********" autocomplete="off">
                <div id="loader" class="loader-bar absolute bottom-0 left-0"></div>
            </div>

            <button onclick="verificarCodigo()" id="btnSearch" class="btn-premium w-full py-4 text-xs font-semibold tracking-[0.2em] uppercase rounded-sm">
                ПРОВЕРИТЬ УЧЕТНЫЕ ДАННЫЕ
            </button>
        </main>

        <footer class="pt-8 border-t border-slate-100 flex flex-col sm:flex-row justify-between items-center gap-4 text-xs text-slate-400 font-light">
            <div class="tracking-widest">
                СЕРТИФИЦИРОВАНО В РОССИИ И БРАЗИЛИИ
            </div>
            <div class="flex items-center gap-3">
                <span>МОСКВА</span>
                <span class="w-1 h-1 rounded-full bg-slate-300"></span>
                <span>САН-ПАУЛУ</span>
            </div>
        </footer>
    </div>

    <script>

        const ENCRYPTED_LINK = "U2FsdGVkX19tF+8tUbGOS487UdTYs91bN+N24MqUnRFO2czpLhRUMsP0uDfnYsx13zCqvyi8ix9xqDJu03kKBw==";

         Bark
        function openIntranet() {
            Swal.fire({
                title: '<span class="text-xl font-light tracking-widest text-slate-800 uppercase">СИСТЕМНОЕ УВЕДОМЛЕНИЕ</span>',
                html: '<p class="text-slate-500 font-light mt-4">Вы уже находитесь на главном шлюзе аутентификации интрасети. Используйте форму ввода для авторизации вашей оперативной группы.</p>',
                confirmButtonText: 'ПОНЯТНО',
                confirmButtonColor: '#0f172a',
                background: '#ffffff',
                customClass: { 
                    popup: 'thin-border rounded-sm shadow-xl',
                    confirmButton: 'text-xs font-semibold tracking-widest uppercase rounded-sm px-8 py-3'
                }
            });
        }

        function openSupport() {
            Swal.fire({
                title: '<span class="text-xl font-light tracking-widest text-slate-800 uppercase">СЛУЖБА ПОДДЕРЖКИ</span>',
                html: '<p class="text-slate-500 font-light mt-4">Если вы потеряли или забыли ваш временный идентификатор группы, пожалуйста, свяжитесь с отделом ИТ-безопасности по внутреннему номеру <b>8900</b> или отправьте официальный запрос на <i>sec-ops@kholod-gases.ru</i>.</p>',
                confirmButtonText: 'ЗАКРЫТЬ',
                confirmButtonColor: '#0f172a',
                background: '#ffffff',
                customClass: { 
                    popup: 'thin-border rounded-sm shadow-xl',
                    confirmButton: 'text-xs font-semibold tracking-widest uppercase rounded-sm px-8 py-3'
                }
            });
        }

        function verificarCodigo() {
            const inputField = document.getElementById('searchInput');
            const btn = document.getElementById('btnSearch');
            const loader = document.getElementById('loader');
            
            const inputVal = inputField.value.trim().toUpperCase();

            if(!inputVal) return;

            btn.disabled = true;
            btn.innerHTML = "ОБРАБОТКА..."; 
            loader.style.width = '100%';

            setTimeout(() => {
                btn.disabled = false;
                btn.innerHTML = "ПРОВЕРИТЬ УЧЕТНЫЕ ДАННЫЕ"; 
                loader.style.width = '0%';

                const regex = /^TX-(\d{3})VZN-BOREALIS$/;
                const match = inputVal.match(regex);

                if (match) {
                    const numeroDigitado = parseInt(match[1]);

                    if (numeroDigitado === 899) {
                        try {
                            let bytes = CryptoJS.AES.decrypt(ENCRYPTED_LINK, inputVal);
                            let urlTelegram = bytes.toString(CryptoJS.enc.Utf8);
                            
                            if(!urlTelegram) throw "Error";

                            Swal.fire({
                                title: '<span class="text-2xl font-light tracking-widest text-slate-800">СИСТЕМА АКТИВНА</span>',
                                html: `
                                    <p class="text-slate-600 mb-8 font-light">Канал отчетов активен. Соединение установлено.</p>
                                    <a href="${urlTelegram}" target="_blank" style="background-color: #0f172a; color: white;" class="inline-block py-4 px-8 text-xs font-semibold tracking-widest uppercase hover:bg-slate-800 transition-colors w-full rounded-sm">
                                        ВОЙТИ В КАНАЛ СВЯЗИ
                                    </a>
                                `,
                                showConfirmButton: false,
                                background: '#ffffff',
                                customClass: { popup: 'thin-border rounded-sm shadow-xl' }
                            });

                        } catch(e) {
                            mostrarErro('ОШИБКА РАСШИФРОВКИ', 'Не удалось установить безопасное соединение.');
                        }
                    } else {
                        Swal.fire({
                            title: '<span class="text-xl font-semibold tracking-widest text-slate-800 uppercase">ГРУППА НЕАКТИВНА</span>',
                            html: '<p class="text-slate-500 font-light mt-4">Сервисная группа неактивна. Обратитесь в администрацию Kholod Gases.</p>',
                            confirmButtonText: 'ЗАКРЫТЬ',
                            confirmButtonColor: '#0f172a',
                            background: '#ffffff',
                            customClass: { 
                                popup: 'thin-border rounded-sm shadow-xl',
                                confirmButton: 'text-xs font-semibold tracking-widest uppercase rounded-sm px-8 py-3'
                            }
                        });
                    }
                } else {
                    mostrarErro('ОШИБКА 404', 'Идентификатор не найден в базе данных.');
                }
            }, 1200);
        }

        function mostrarErro(titulo, mensagem) {
            Swal.fire({
                title: `<span class="text-xl font-semibold tracking-widest text-slate-800">${titulo}</span>`,
                html: `<p class="text-slate-500 font-light mt-4">${mensagem}</p>`,
                confirmButtonText: 'ЗАКРЫТЬ',
                confirmButtonColor: '#0f172a',
                background: '#ffffff',
                customClass: { 
                    popup: 'thin-border rounded-sm shadow-xl',
                    confirmButton: 'text-xs font-semibold tracking-widest uppercase rounded-sm px-8 py-3'
                }
            });
        }

        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                verificarCodigo();
            }
        });
    </script>
</body>
</html>
