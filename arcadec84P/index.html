<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio Operacional | Flappy Hacker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            background-image: url('../assets/banner-arcadec84P.webp'); 
            background-size: cover;
            background-position: center;
            background-color: #09090b; 
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .scanlines, .vignette {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
        }

        .scanlines {
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            z-index: 50;
        }

        .vignette {
            background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.8) 100%);
            z-index: 49;
        }

        #gameContainer {
            position: relative;
            width: 800px;
            height: 500px;
            background-color: rgba(10, 10, 26, 0.85); 
            backdrop-filter: blur(8px);
            box-shadow: 0 0 40px rgba(139, 92, 246, 0.4); 
            border: 1px solid rgba(139, 92, 246, 0.5);
            border-radius: 8px;
            overflow: hidden;
            z-index: 10;
        }

        #gameCanvas {
            background-color: transparent; 
            display: block;
        }
    </style>
</head>
<body>

    <div class="scanlines"></div>
    <div class="vignette"></div>

    <div class="z-20 text-center mb-4 relative">
        <h1 class="text-3xl font-bold tracking-widest text-purple-400" style="text-shadow: 0 0 10px rgba(139, 92, 246, 0.8);">NEON_RUN</h1>
        <p class="text-gray-300 text-sm mt-1 bg-black/50 px-4 py-1 rounded-full inline-block backdrop-blur-sm border border-gray-700">Conquiste a vitória superando 10 obstáculos.</p>
    </div>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
    </div>

    <div class="z-20 text-center mt-6 text-xs text-purple-300 bg-black/60 p-3 rounded-lg border border-purple-500/30 backdrop-blur-md relative">
        <p>[SISTEMA]: O código parece não estar funcionando bem, é necessário modificá-lo.</p>
        <p>Acesse o console para injetar parâmetros de estabilização.</p>
    </div>

    <script>
        const AVATAR_URL = "avatar.png";
        const avatarImg = new Image();
        avatarImg.src = AVATAR_URL;
        const cofreHash = [109, 77, 85, 100, 101, 85, 98, 62, 70, 70, 85, 121, 111, 85, 70, 58, 65, 101];

        let currentGravity = 0.6;
        let currentPipeSpeed = 4;
        let currentGap = 160;

        window.GamePhysics = {
            gravity: 0.6,      // gravidade
            jumpForce: -4,     
            pipeSpeed: 4,      // velocidade
            gapSize: 160,
            isHacked: false
        };

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let frames = 0;
        let score = 0;
        let isGameOver = false;
        let bgOffset1 = 0; 
        let bgOffset2 = 0; 
        
        const buildingsBack = [];
        const buildingsFront = [];
        
        for(let i=0; i<30; i++) {
            buildingsBack.push({ width: 60 + Math.random()*80, height: 100 + Math.random()*250 });
            buildingsFront.push({ width: 40 + Math.random()*60, height: 50 + Math.random()*150, neonColor: Math.random() > 0.5 ? '#8b5cf6' : '#06b6d4' });
        }

        function drawCyberCity() {
            bgOffset1 -= currentPipeSpeed * 0.2;
            if (bgOffset1 <= -1000) bgOffset1 = 0;
            
            ctx.fillStyle = "#110b1c";
            let xBack = bgOffset1;
            for(let i=0; i<buildingsBack.length; i++) {
                ctx.fillRect(xBack, canvas.height - buildingsBack[i].height, buildingsBack[i].width, buildingsBack[i].height);
                xBack += buildingsBack[i].width;
            }
            if(xBack < canvas.width) {
                 for(let i=0; i<buildingsBack.length; i++) {
                    ctx.fillRect(xBack, canvas.height - buildingsBack[i].height, buildingsBack[i].width, buildingsBack[i].height);
                    xBack += buildingsBack[i].width;
                }
            }

            bgOffset2 -= currentPipeSpeed * 0.5;
            if (bgOffset2 <= -1000) bgOffset2 = 0;

            let xFront = bgOffset2;
            for(let i=0; i<buildingsFront.length; i++) {
                ctx.fillStyle = "#18182b";
                ctx.fillRect(xFront, canvas.height - buildingsFront[i].height, buildingsFront[i].width, buildingsFront[i].height);
                ctx.fillStyle = buildingsFront[i].neonColor;
                ctx.fillRect(xFront, canvas.height - buildingsFront[i].height, buildingsFront[i].width, 2);
                xFront += buildingsFront[i].width;
            }
            if(xFront < canvas.width) {
                 for(let i=0; i<buildingsFront.length; i++) {
                    ctx.fillStyle = "#18182b";
                    ctx.fillRect(xFront, canvas.height - buildingsFront[i].height, buildingsFront[i].width, buildingsFront[i].height);
                    ctx.fillStyle = buildingsFront[i].neonColor;
                    ctx.fillRect(xFront, canvas.height - buildingsFront[i].height, buildingsFront[i].width, 2);
                    xFront += buildingsFront[i].width;
                }
            }
        }

        const bird = {
            x: 80,
            y: 250,
            width: 70,
            height: 70,
            velocity: 0,
            rotation: 0,
            draw() {

                if (avatarImg.complete) {
                    ctx.save();

                    ctx.translate(this.x + this.width/2, this.y + this.height/2);

                    ctx.rotate(this.rotation * Math.PI / 180);

                    ctx.drawImage(avatarImg, -this.width/2, -this.height/2, this.width, this.height);
                    
                    ctx.restore();
                } else {
                    ctx.fillStyle = "#8b5cf6";
                    ctx.fillRect(this.x, this.y, this.width, this.height);
                }
            },
            
            update() {

                if (window.GamePhysics.gravity !== 0.6 || window.GamePhysics.pipeSpeed !== 4) {
                    window.GamePhysics.isHacked = true;
                }
                currentGravity = window.GamePhysics.isHacked ? window.GamePhysics.gravity : currentGravity;

                this.velocity += currentGravity;
                this.y += this.velocity;

                if (this.velocity > 0) {
                    this.rotation += 3;
                    if (this.rotation > 45) this.rotation = 45;
                }

                if (this.y + this.height >= canvas.height || this.y <= 0) {
                    triggerGameOver();
                }
            },

            flap() {
                this.velocity = window.GamePhysics.isHacked ? window.GamePhysics.jumpForce : -8;

                this.rotation = -25; 
            }
        };

        const pipes = [];

        function drawPipes() {
            for (let i = 0; i < pipes.length; i++) {
                let p = pipes[i];
                
                let gradientTop = ctx.createLinearGradient(p.x, 0, p.x + p.width, 0);
                gradientTop.addColorStop(0, "rgba(220, 38, 38, 0.8)"); 
                gradientTop.addColorStop(0.5, "rgba(239, 68, 68, 0.4)");
                gradientTop.addColorStop(1, "rgba(220, 38, 38, 0.8)");

                ctx.fillStyle = gradientTop;
                ctx.fillRect(p.x, 0, p.width, p.top);
                ctx.fillRect(p.x, canvas.height - p.bottom, p.width, p.bottom);

                ctx.fillStyle = "#ff0000";
                ctx.shadowBlur = 10;
                ctx.shadowColor = "#ff0000";
                ctx.fillRect(p.x - 2, p.top - 5, p.width + 4, 5); 
                ctx.fillRect(p.x - 2, canvas.height - p.bottom, p.width + 4, 5); 
                ctx.shadowBlur = 0; 

                currentPipeSpeed = window.GamePhysics.isHacked ? window.GamePhysics.pipeSpeed : currentPipeSpeed;
                p.x -= currentPipeSpeed;

                let margin = 12;

                if (bird.x + bird.width - margin > p.x && 
                    bird.x + margin < p.x + p.width &&
                    (bird.y + margin < p.top || bird.y + bird.height - margin > canvas.height - p.bottom)) {
                    
                    triggerGameOver();
                }

                if (p.x === bird.x) {
                    score++;

                    if(score === 2 && !window.GamePhysics.isHacked) {
                        document.querySelector('h1').innerText = "SISTEMA COMPROMETIDO";
                        document.querySelector('h1').className = "text-3xl font-bold tracking-widest text-red-500 animate-pulse";
                        
                        currentPipeSpeed = 25; 
                        currentGravity = 3;   
                    }

                    if (score >= 10) {
                        triggerWin();
                    }
                }
            }
        }

        function updatePipes() {

            let targetDistance = window.GamePhysics.isHacked ? 320 : (score >= 2 ? 300 : 400);

            let lastPipe = pipes[pipes.length - 1];

            if (!lastPipe || (canvas.width - lastPipe.x) >= targetDistance) {

                currentGap = window.GamePhysics.isHacked ? window.GamePhysics.gapSize : (score >= 2 ? 40 : 160);

                let minPipeHeight = 50;
                let maxPipeHeight = canvas.height - currentGap - minPipeHeight;
                let topHeight = Math.floor(Math.random() * (maxPipeHeight - minPipeHeight + 1) + minPipeHeight);
                
                pipes.push({
                    x: canvas.width,
                    width: 60,
                    top: topHeight,
                    bottom: canvas.height - (topHeight + currentGap)
                });
            }

            if (pipes.length > 0 && pipes[0].x < -100) {
                pipes.shift();
            }
        }

        function drawScore() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.5)";
            ctx.fillRect(10, 10, 150, 60);
            ctx.fillStyle = "#06b6d4";
            ctx.font = "20px Courier New";
            ctx.fillText("PACOTES: " + score, 20, 35);
            ctx.font = "12px Courier New";
            ctx.fillText("META: 10", 20, 55);
        }

        function triggerGameOver() {
            isGameOver = true;
            ctx.fillStyle = "rgba(220, 38, 38, 0.3)"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#fff";
            ctx.font = "bold 30px Courier New";
            ctx.textAlign = "center";
            ctx.fillText("FIREWALL HIT", canvas.width/2, canvas.height/2);
            ctx.font = "14px Courier New";
            ctx.fillText("Pressione espaço ou clique para reiniciar.", canvas.width/2, canvas.height/2 + 30);
            ctx.textAlign = "left"; 
        }

        function triggerWin() {
            isGameOver = true;
            
            let flag = "";
            for(let i = 0; i < cofreHash.length; i++) {
                flag += String.fromCharCode(cofreHash[i] ^ score);
            }

            Swal.fire({
                title: 'BYPASS BEM SUCEDIDO',
                html: `<p class="text-gray-300 mb-4 text-sm">Controle de física manual estabelecido. A sua Flag é:</p>
                       <div class="bg-black p-4 rounded text-purple-400 font-mono text-xl border border-purple-500/30 select-all">${flag}</div>
                       <p class="mt-6 text-xs text-gray-500 uppercase tracking-widest">Guarde o hash. Atualize a página (F5) para sair.</p>`,
                icon: 'success',
                background: '#0a0a0f',
                color: '#fff',
                showConfirmButton: false, 
                allowOutsideClick: false, 
                allowEscapeKey: false, 
                allowEnterKey: false 
            });
        }

        window.addEventListener("keydown", (e) => {
            if (score >= 10) return; 

            if (e.code === "Space") {
                if (isGameOver && score < 10) resetGame();
                else bird.flap();
            }
        });

        canvas.addEventListener("mousedown", () => {
            if (score >= 10) return;

            if (isGameOver && score < 10) resetGame();
            else bird.flap();
        });

        avatarImg.onload = loop;

        function resetGame() {
            bird.y = 250;
            bird.velocity = 0;
            pipes.length = 0;
            score = 0;
            frames = 0;
            isGameOver = false;

            if(!window.GamePhysics.isHacked) {
                document.querySelector('h1').innerText = "NEON_RUN";
                document.querySelector('h1').className = "text-3xl font-bold tracking-widest text-purple-400";
                currentGravity = 0.6;
                currentPipeSpeed = 4;
            } else {

                currentGravity = window.GamePhysics.gravity;
                currentPipeSpeed = window.GamePhysics.pipeSpeed;
                document.querySelector('h1').innerText = "PHYSICS_OVERRIDE_ACTIVE";
                document.querySelector('h1').className = "text-3xl font-bold tracking-widest text-green-400";
            }
            
            loop();
        }

        function loop() {
            if (isGameOver) return;

            ctx.fillStyle = "#0a0a1a";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawCyberCity();
            
            bird.update();
            bird.draw();
            
            updatePipes();
            drawPipes();
            drawScore();

            frames++;
            requestAnimationFrame(loop);
        }

        window.addEventListener("keydown", (e) => {
            if (e.code === "Space") {
                if (isGameOver && score < 10) resetGame();
                else bird.flap();
            }
        });

        canvas.addEventListener("mousedown", () => {
            if (isGameOver && score < 10) resetGame();
            else bird.flap();
        });

        avatarImg.onload = loop; 
    </script>
